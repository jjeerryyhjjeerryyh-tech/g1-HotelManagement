<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XX酒店 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Hero Section 样式 */
        .hero-section {
            position: relative;
            height: 100vh;
            min-height: 600px;
            width: 100%;
            overflow: hidden;
        }

        /* 轮播容器 */
        .carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .carousel-slides {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            z-index: 1;
        }

        .slide.active {
            opacity: 1;
            z-index: 2;
        }

        /* 图片放置位置 */
        .slide-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .slide-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.8), rgba(0,0,0,0.5), transparent);
            z-index: 3;
        }

        .slide-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            display: flex;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .hero-text {
            max-width: 600px;
        }

        .hero-title {
            font-size: 48px;
            font-weight: bold;
            color: white;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .hero-title span {
            display: block;
        }

        .hero-title .highlight {
            color: #fbbf24;
        }

        .hero-subtitle {
            font-size: 18px;
            color: #e5e5e5;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* 特性列表 */
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-top: 40px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .feature-icon {
            width: 24px;
            height: 24px;
            background-color: #fbbf24;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .feature-icon svg {
            width: 16px;
            height: 16px;
            color: #000;
        }

        .feature-text {
            color: white;
            font-size: 16px;
        }

        /* 轮播控制按钮 */
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            width: 50px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }

        .carousel-btn:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .carousel-btn svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .carousel-btn.prev {
            left: 20px;
        }

        .carousel-btn.next {
            right: 20px;
        }

        /* 轮播指示点 */
        .carousel-dots {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 12px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .dot.active {
            background-color: #fbbf24;
            transform: scale(1.2);
        }

        /* ========== 搜索栏样式 ========== */
        .search-section {
            background-color: white;
            padding: 40px 20px 60px;
            box-shadow: 0 -20px 40px rgba(0,0,0,0.1);
            position: relative;
            z-index: 20;
        }

        .hotel-info {
            text-align: center;
            margin-bottom: 30px;
        }

        .hotel-name {
            font-size: 28px;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 10px;
        }

        .hotel-address {
            color: #6b7280;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .hotel-address svg {
            width: 20px;
            height: 20px;
        }

        .search-form {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr) auto;
            gap: 15px;
            background-color: #f9fafb;
            padding: 25px;
            border-radius: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 500;
            color: #374151;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            background-color: white;
        }

        .input-wrapper input:focus,
        .input-wrapper select:focus {
            border-color: #fbbf24;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #9ca3af;
        }

        .search-btn {
            background-color: #fbbf24;
            color: #000;
            font-weight: 600;
            padding: 0 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            height: 45px;
            align-self: flex-end;
        }

        .search-btn:hover {
            background-color: #f59e0b;
        }

        /* 房间类型快速选择 */
        .room-types {
            max-width: 1000px;
            margin: 20px auto 0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .room-type-btn {
            padding: 8px 20px;
            border: 1px solid #e5e7eb;
            border-radius: 30px;
            background: white;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .room-type-btn:hover,
        .room-type-btn.active {
            background-color: #fbbf24;
            border-color: #fbbf24;
            color: #000;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .search-form {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 36px;
            }
            
            .search-form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section with 轮播 -->
    <section class="hero-section">
        <div class="carousel-container">
            <div class="carousel-slides">
                <!-- 幻灯片1 - 在这里放第一张图片 -->
                <div class="slide active">
                    <img src="images/hotel1.png" alt="酒店外观" class="slide-image">
                    <div class="slide-overlay"></div>
                    <div class="slide-content">
                        <div class="container">
                            <div class="hero-text">
                                <h1 class="hero-title">
                                    <span>文本</span>
                                    <span class="highlight">文本</span>
                                </h1>
                                <p class="hero-subtitle">
                                    文本
                                </p>
                                <div class="features">
                                    <div class="feature-item">
                                        <div class="feature-icon">✓</div>
                                        <span class="feature-text">文本</span>
                                    </div>
                                    <div class="feature-item">
                                        <div class="feature-icon">✓</div>
                                        <span class="feature-text">文本</span>
                                    </div>
                                    <div class="feature-item">
                                        <div class="feature-icon">✓</div>
                                        <span class="feature-text">文本</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 幻灯片2 - 在这里放第二张图片 -->
                <div class="slide">
                    <img src="images/hotel2.webp" alt="豪华客房" class="slide-image">
                    <div class="slide-overlay"></div>
                    <div class="slide-content">
                        <div class="container">
                            <div class="hero-text">
                                <h1 class="hero-title">
                                    <span>文本1</span>
                                    <span class="highlight">文本</span>
                                </h1>
                                <p class="hero-subtitle">
                                    文本。
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 幻灯片3 - 在这里放第三张图片 -->
                <div class="slide">
                    <img src="images/hotel3.jpg" alt="精致餐饮" class="slide-image">
                    <div class="slide-overlay"></div>
                    <div class="slide-content">
                        <div class="container">
                            <div class="hero-text">
                                <h1 class="hero-title">
                                    <span>文本</span>
                                    <span class="highlight">文本</span>
                                </h1>
                                <p class="hero-subtitle">
                                    文本
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 轮播按钮 -->
            <button class="carousel-btn prev">❮</button>
            <button class="carousel-btn next">❯</button>
            <div class="carousel-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
    </section>

    <!-- 搜索栏 - 直接放在Hero下面 -->
    <section class="search-section">
        <div class="container">
            <!-- 酒店信息 -->
            <div class="hotel-info">
                <div class="hotel-name">🏨 XX酒店 </div>
                <div class="hotel-address">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor">
                        <path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-width="2"/>
                        <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"/>
                    </svg>
                    地址
                </div>
            </div>

            <!-- 搜索表单 -->
            <form class="search-form" id="bookingForm">
                <div class="form-group">
                    <label>入住日期</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2"/>
                        </svg>
                        <input type="date" id="checkIn" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>离店日期</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2"/>
                        </svg>
                        <input type="date" id="checkOut" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>房间数</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" stroke-width="2"/>
                        </svg>
                        <select id="rooms">
                            <option value="1">1 间</option>
                            <option value="2">2 间</option>
                            <option value="3">3 间</option>
                            <option value="3">4 间</option>
                            <option value="3">5 间</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>入住人数</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/>
                        </svg>
                        <select id="guests">
                            <option value="1">1 人</option>
                            <option value="2" selected>2 人</option>
                            <option value="3">3 人</option>
                            <option value="4">4 人</option>
                            <option value="4">5 人</option>
                            <option value="4">6 人</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="search-btn">查询空房</button>
            </form>

            <!-- 房间类型快速筛选 -->
            <div class="room-types">
                <button type="button" class="room-type-btn active">全部房型</button>
                <button type="button" class="room-type-btn">豪华大床房</button>
                <button type="button" class="room-type-btn">行政套房</button>
                <button type="button" class="room-type-btn">家庭套房</button>
            </div>
        </div>
    </section>

    <script>
        // 轮播功能
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');
        
        function showSlide(index) {
            if (index < 0) index = slides.length - 1;
            if (index >= slides.length) index = 0;
            
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            
            slides[index].classList.add('active');
            dots[index].classList.add('active');
            currentSlide = index;
        }
        
        document.querySelector('.prev').addEventListener('click', () => showSlide(currentSlide - 1));
        document.querySelector('.next').addEventListener('click', () => showSlide(currentSlide + 1));
        
        dots.forEach((dot, i) => {
            dot.addEventListener('click', () => showSlide(i));
        });
        
        // 自动播放
        setInterval(() => showSlide(currentSlide + 1), 5000);
        
        // 设置默认日期
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        
        document.getElementById('checkIn').value = today.toISOString().split('T')[0];
        document.getElementById('checkOut').value = tomorrow.toISOString().split('T')[0];
        
        // 表单提交
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('正在查询可用房间...');
        });
    </script>
</body>
</html>
