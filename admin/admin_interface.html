<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒店管理员系统</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标 -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#0FC6C2',
                        accent: '#722ED1',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        success: '#00B42A',
                        dark: '#1D2129',
                        light: '#F2F3F5'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="admin.css">
</head>
<body class="bg-gray-50 font-sans text-dark">
    <div class="flex h-screen overflow-hidden">
        <!-- 侧边栏 -->
        <aside class="w-64 bg-white shadow-lg h-full transition-all duration-300 z-10 flex flex-col">
            <!-- 品牌/logo区域 -->
            <div class="h-16 flex items-center justify-center border-b border-gray-200">
                <h1 class="text-xl font-bold text-primary flex items-center">
                    <i class="fa fa-hotel mr-2"></i>
                    <span>酒店管理系统</span>
                </h1>
            </div>
            
            <!-- 管理员信息 -->
            <div class="p-4 border-b border-gray-200">
                <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary">
                        <i class="fa fa-user"></i>
                    </div>
                    <div class="ml-3">
                        <p class="font-medium">管理员</p>
                        <p class="text-xs text-gray-500">admin@hotel.com</p>
                    </div>
                </div>
            </div>
            
            <!-- 导航菜单 -->
            <nav class="py-4 flex-1">
                <ul>
                    <li>
                        <a href="#dashboard" class="sidebar-item-active flex items-center px-6 py-3 text-sm">
                            <i class="fa fa-dashboard w-5 text-center"></i>
                            <span class="ml-3">仪表盘</span>
                        </a>
                    </li>
                    <li>
                        <a href="#rooms" class="flex items-center px-6 py-3 text-sm text-gray-700 hover:bg-gray-100 transition-colors duration-200">
                            <i class="fa fa-bed w-5 text-center"></i>
                            <span class="ml-3">客房管理</span>
                            <span class="ml-auto bg-danger text-white text-xs px-1.5 py-0.5 rounded-full">12</span>
                        </a>
                    </li>
                    <li>
                        <a href="#customers" onclick="scrollToUsers()" class="flex items-center px-6 py-3 text-sm text-gray-700 hover:bg-gray-100 transition-colors duration-200">
                            <i class="fa fa-users w-5 text-center"></i>
                            <span class="ml-3">客户管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="#orders" class="flex items-center px-6 py-3 text-sm text-gray-700 hover:bg-gray-100 transition-colors duration-200">
                            <i class="fa fa-file-text w-5 text-center"></i>
                            <span class="ml-3">订单管理</span>
                            <span class="ml-auto bg-warning text-white text-xs px-1.5 py-0.5 rounded-full">8</span>
                        </a>
                    </li>
                    <li>
                        <a href="#cleaning" class="flex items-center px-6 py-3 text-sm text-gray-700 hover:bg-gray-100 transition-colors duration-200">
                            <i class="fa fa-broom w-5 text-center"></i>
                            <span class="ml-3">清洁管理</span>
                        </a>
                    </li>
                    <li>
                        <a href="#reports" class="flex items-center px-6 py-3 text-sm text-gray-700 hover:bg-gray-100 transition-colors duration-200">
                            <i class="fa fa-bar-chart w-5 text-center"></i>
                            <span class="ml-3">数据报表</span>
                        </a>
                    </li>
                    <li>
                        <a href="#settings" class="flex items-center px-6 py-3 text-sm text-gray-700 hover:bg-gray-100 transition-colors duration-200">
                            <i class="fa fa-cog w-5 text-center"></i>
                            <span class="ml-3">系统设置</span>
                        </a>
                    </li>
                </ul>
            </nav>
            
            <!-- 退出按钮 -->
            <div class="p-4 border-t border-gray-200">
                <button class="flex items-center w-full px-6 py-2 text-sm text-danger hover:bg-danger/10 rounded-md transition-colors duration-200">
                    <i class="fa fa-sign-out w-5 text-center"></i>
                    <span class="ml-3">退出登录</span>
                </button>
            </div>
        </aside>
        
        <!-- 主内容区域 -->
        <main class="flex-1 overflow-y-auto bg-gray-50">
            <!-- 顶部导航栏 -->
            <header class="bg-white shadow-sm h-16 sticky top-0 z-10">
                <div class="flex items-center justify-between h-full px-6">
                    <!-- 左侧：面包屑导航 -->
                    <div class="flex items-center">
                        <button id="sidebar-toggle" class="mr-4 text-gray-500 hover:text-primary">
                            <i class="fa fa-bars text-lg"></i>
                        </button>
                        <nav class="text-sm">
                            <ol class="flex items-center space-x-2">
                                <li><a href="#" class="text-primary">首页</a></li>
                                <li><i class="fa fa-angle-right text-gray-400"></i></li>
                                <li class="text-gray-500">仪表盘</li>
                            </ol>
                        </nav>
                    </div>
                    
                    <!-- 右侧：功能按钮和用户操作 -->
                    <div class="flex items-center space-x-4">
                        <!-- 搜索框 -->
                        <div class="relative">
                            <input type="text" placeholder="搜索..." class="pl-8 pr-4 py-2 rounded-md border border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm w-48">
                            <i class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        </div>
                        
                        <!-- 通知图标 -->
                        <div class="relative">
                            <button class="text-gray-500 hover:text-primary relative">
                                <i class="fa fa-bell text-lg"></i>
                                <span class="absolute -top-1 -right-1 w-4 h-4 bg-danger rounded-full flex items-center justify-center text-xs text-white">5</span>
                            </button>
                        </div>
                        
                        <!-- 语言切换 -->
                        <div class="relative">
                            <button class="flex items-center text-gray-500 hover:text-primary">
                                <span class="mr-1">简体中文</span>
                                <i class="fa fa-chevron-down text-xs"></i>
                            </button>
                        </div>
                        
                        <!-- 用户头像 -->
                        <div class="relative">
                            <button class="flex items-center">
                                <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-primary mr-2">
                                    <i class="fa fa-user"></i>
                                </div>
                                <i class="fa fa-chevron-down text-xs text-gray-500"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- 主要内容 -->
            <div class="p-6">
                <!-- 页面标题 -->
                <div class="mb-6">
                    <h2 class="text-[clamp(1.25rem,2vw,1.75rem)] font-bold">仪表盘</h2>
                    <p class="text-gray-500 mt-1">欢迎回来，管理员！这是您的酒店运营概览</p>
                </div>
                
                <!-- 数据统计卡片 -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                    <!-- 总客房数 -->
                    <div class="bg-white rounded-lg p-6 card-shadow">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">总客房数</p>
                                <h3 class="text-3xl font-bold mt-2">120</h3>
                                <p class="text-success text-sm mt-2 flex items-center">
                                    <i class="fa fa-arrow-up mr-1"></i> 5% 较上月
                                </p>
                            </div>
                            <div class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                                <i class="fa fa-bed text-xl"></i>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 已入住客房 -->
                    <div class="bg-white rounded-lg p-6 card-shadow">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">已入住客房</p>
                                <h3 class="text-3xl font-bold mt-2">86</h3>
                                <p class="text-success text-sm mt-2 flex items-center">
                                    <i class="fa fa-arrow-up mr-1"></i> 12% 较上月
                                </p>
                            </div>
                            <div class="w-12 h-12 rounded-full bg-warning/10 flex items-center justify-center text-warning">
                                <i class="fa fa-key text-xl"></i>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 今日订单 -->
                    <div class="bg-white rounded-lg p-6 card-shadow">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">今日订单</p>
                                <h3 class="text-3xl font-bold mt-2">24</h3>
                                <p class="text-danger text-sm mt-2 flex items-center">
                                    <i class="fa fa-arrow-down mr-1"></i> 3% 较昨日
                                </p>
                            </div>
                            <div class="w-12 h-12 rounded-full bg-success/10 flex items-center justify-center text-success">
                                <i class="fa fa-file-text text-xl"></i>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 今日营收 -->
                    <div class="bg-white rounded-lg p-6 card-shadow">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-gray-500 text-sm">今日营收</p>
                                <h3 class="text-3xl font-bold mt-2">¥28,560</h3>
                                <p class="text-success text-sm mt-2 flex items-center">
                                    <i class="fa fa-arrow-up mr-1"></i> 8% 较昨日
                                </p>
                            </div>
                            <div class="w-12 h-12 rounded-full bg-accent/10 flex items-center justify-center text-accent">
                                <i class="fa fa-yen text-xl"></i>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 客户管理 CRUD -->
                <div class="bg-white rounded-lg card-shadow" id="section-users">
                    <div class="p-6 border-b border-gray-200">
                        <div class="flex items-center justify-between">
                            <h3 class="font-bold text-lg">Customer Management</h3>
                            <button onclick="openModal()" class="btn-primary text-sm px-4 py-2">
                                <i class="fa fa-plus mr-1"></i> Add User
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="bg-gray-50 text-left text-sm text-gray-600">
                                    <th class="px-6 py-3">Username</th>
                                    <th class="px-6 py-3">Full Name</th>
                                    <th class="px-6 py-3">Email</th>
                                    <th class="px-6 py-3">Phone</th>
                                    <th class="px-6 py-3">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody" class="divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 弹窗 -->
                <div id="userModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
                    <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h3 id="modalTitle" class="font-bold text-lg">Add User</h3>
                            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                                <i class="fa fa-times text-xl"></i>
                            </button>
                        </div>
                        <form id="userForm" class="space-y-4">
                            <input type="hidden" id="userId">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                                <input id="fieldUsername" type="text" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                                <input id="fieldFullName" type="text" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input id="fieldEmail" type="email" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                                <input id="fieldPhone" type="tel" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary" required>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Password <span id="passwordHint" class="text-gray-400 font-normal">(leave blank to keep current)</span></label>
                                <input id="fieldPassword" type="password" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
                            </div>
                            <div class="flex justify-end space-x-3 pt-2">
                                <button type="button" onclick="closeModal()" class="btn-secondary px-4 py-2 text-sm">Cancel</button>
                                <button type="submit" class="btn-primary px-4 py-2 text-sm">Save</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- JavaScript -->
    <script src="admin.js"></script>
</body>
</html>
