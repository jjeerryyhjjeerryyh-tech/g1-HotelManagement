<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <header class="navbar">
        <div class="navbar-inner">
            <span class="logo">🏨 XX Hotel 管理后台</span>
            <div class="nav-right">
                <span id="adminGreeting"></span>
                <button id="logoutBtn">退出登录</button>
            </div>
        </div>
    </header>

    <main class="main">
        <h2>用户管理</h2>
        <table id="userTable">
            <thead>
                <tr>
                    <th>用户名</th>
                    <th>姓名</th>
                    <th>邮箱</th>
                    <th>电话</th>
                    <th>角色</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </main>

    <script src="admin.js"></script>
</body>
</html>
