<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XX酒店 - 首页</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="homepageStyle.css">
</head>
<body>
    <!-- 导航栏 -->
    <header class="navbar">
        <div class="container navbar-container">
            <div class="logo">🏨 XX Hotel</div>
            <div class="nav-buttons">
            <a href="../login/login.html" class="nav-btn register-btn">Sign up</a>
            <a href="../login/login.html" class="nav-btn login-btn">Log in</a>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">🌙</button>
            </div>
        </div>
    </header>

    <!-- Hero Section with 轮播 -->
    <section class="hero-section">
        <div class="carousel-container">
            <div class="carousel-slides">
                <!-- 幻灯片1 - 在这里放第一张图片 -->
                <div class="slide active">
                    <img src="images/hotel1.png" alt="酒店外观" class="slide-image">
                    <div class="slide-overlay"></div>
                    <div class="slide-content">
                        <div class="container">
                            <div class="hero-text">
                                <h1 class="hero-title">
                                    <span>为您开启</span>
                                    <span class="highlight">奢华住宿体验</span>
                                </h1>
                                <p class="hero-subtitle">
                                    在这里，每一处细节都为您精心打造，让您的旅程充满温馨与舒适。
                                </p>
                                <div class="features">
                                    <div class="feature-item">
                                        <div class="feature-icon">✓</div>
                                        <span class="feature-text">五星级服务</span>
                                    </div>
                                    <div class="feature-item">
                                        <div class="feature-icon">✓</div>
                                        <span class="feature-text">无敌海景</span>
                                    </div>
                                    <div class="feature-item">
                                        <div class="feature-icon">✓</div>
                                        <span class="feature-text">顶奢配套</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 幻灯片2 - 在这里放第二张图片 -->
                <div class="slide">
                    <img src="images/hotel2.png" alt="豪华客房" class="slide-image">
                    <div class="slide-overlay"></div>
                    <div class="slide-content">
                        <div class="container">
                            <div class="hero-text">
                                <h1 class="hero-title">
                                    <span>尽享</span>
                                    <span class="highlight">宁静时光</span>
                                </h1>
                                <p class="hero-subtitle">
                                    在我们的豪华客房中，您可以完全放松身心，感受家一般的温暖。
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 幻灯片3 - 在这里放第三张图片 -->
                <div class="slide">
                    <img src="images/hotel3.png" alt="精致餐饮" class="slide-image">
                    <div class="slide-overlay"></div>
                    <div class="slide-content">
                        <div class="container">
                            <div class="hero-text">
                                <h1 class="hero-title">
                                    <span>品味</span>
                                    <span class="highlight">全球美食</span>
                                </h1>
                                <p class="hero-subtitle">
                                    我们的顶级厨师为您准备了各式佳肴，满足您挑剔的味蕾。
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 轮播按钮 -->
            <button class="carousel-btn prev">❮</button>
            <button class="carousel-btn next">❯</button>
            <div class="carousel-dots">
                <span class="dot active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>
    </section>

    <!-- 搜索栏 - 直接放在Hero下面 -->
    <section class="search-section">
        <div class="container">
            <!-- 酒店信息 -->
            <div class="hotel-info">
                <div class="hotel-name">🏨 XX酒店 </div>
                <div class="hotel-address">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor">
                        <path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" stroke-width="2"/>
                        <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" stroke-width="2"/>
                    </svg>
                    地址
                </div>
            </div>

            <!-- 搜索表单 -->
            <form class="search-form" id="bookingForm">
                <div class="form-group">
                    <label>入住日期</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2"/>
                        </svg>
                        <input type="date" id="checkIn" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>离店日期</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2"/>
                        </svg>
                        <input type="date" id="checkOut" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>房间数</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" stroke-width="2"/>
                        </svg>
                        <select id="rooms">
                            <option value="1">1 间</option>
                            <option value="2">2 间</option>
                            <option value="3">3 间</option>
                            <option value="3">4 间</option>
                            <option value="3">5 间</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>入住人数</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"/>
                        </svg>
                        <select id="guests">
                            <option value="1">1 人</option>
                            <option value="2" selected>2 人</option>
                            <option value="3">3 人</option>
                            <option value="4">4 人</option>
                            <option value="4">5 人</option>
                            <option value="4">6 人</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="search-btn">查询空房</button>
            </form>

            <!-- 房间类型快速筛选 -->
            <div class="room-types">
                <button type="button" class="room-type-btn active">全部房型</button>
                <button type="button" class="room-type-btn">豪华大床房</button>
                <button type="button" class="room-type-btn">行政套房</button>
                <button type="button" class="room-type-btn">家庭套房</button>
            </div>
        </div>
    </section>

    <script src="homepageScript.js"></script>
</body>
</html>
